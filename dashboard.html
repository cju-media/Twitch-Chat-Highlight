<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Chat Highlight Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0e0e10; color: #efeff1; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        /* HEADER SECTION */
        .header { background: #18181b; padding: 10px 15px; border-bottom: 2px solid #9147ff; display: flex; align-items: center; justify-content: space-between; height: 55px; box-sizing: border-box; }
        .header-left { display: flex; gap: 10px; align-items: center; }
        
        button, select { padding: 0 12px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; font-family: inherit; outline: none; font-size: 11px; height: 32px; display: flex; align-items: center; justify-content: center; box-sizing: border-box; transition: background 0.2s; }
        select { background: #000; color: #fff; border: 1px solid #444; }
        
        .btn-settings { background: #333; color: white; min-width: 50px; }
        .btn-settings:hover { background: #444; }
        .btn-clear-red { background: #eb0400; color: white; min-width: 110px; }
        .btn-clear-red:active { transform: scale(0.95); background: #ff0000; }
        .btn-clear-gray { background: #444; color: white; min-width: 90px; }
        .btn-clear-gray:hover { background: #555; }
        
        .btn-close-x { background: transparent; color: #adadb8; font-size: 16px; padding: 0; min-width: 24px; height: 24px; }
        .btn-close-x:hover { color: #efeff1; background: #2f2f35; }

        /* GRID SYSTEM */
        .dashboard-container { display: grid; grid-template-columns: 1fr; grid-template-rows: 1fr; height: calc(100vh - 55px); gap: 1px; background: #1f1f23; transition: all 0.2s ease-in-out; }
        .dashboard-container.has-focus { grid-template-columns: 1fr 1fr; }
        
        /* Mobile/Small Window: Stacked rows when focused */
        @media (max-width: 750px) {
            .dashboard-container.has-focus { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
        }

        .column-pane { background: #0e0e10; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #focus-pane { display: none; }
        .has-focus #focus-pane { display: flex; }

        .column-header { background: #18181b; padding: 8px 15px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #adadb8; border-bottom: 1px solid #1f1f23; display: flex; justify-content: space-between; align-items: center; height: 35px; box-sizing: border-box; }
        
        #chat-log, #user-focus-log { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; justify-content: flex-start; scroll-behavior: smooth; }
        
        /* MESSAGE STYLING */
        .msg { padding: 10px; border-bottom: 1px solid #1f1f23; display: flex; align-items: center; font-size: 13px; flex-shrink: 0; cursor: pointer; line-height: 1.4; }
        .msg:hover { background: #1f1f23; }
        .platform-tag { font-size: 9px; font-weight: 800; padding: 2px 4px; border-radius: 3px; margin-right: 8px; text-transform: uppercase; color: white; min-width: 12px; text-align: center; }
        .tag-twitch { background: #9147ff; }
        .tag-youtube { background: #ff0000; }
        .username { font-weight: 700; margin-right: 6px; white-space: nowrap; }
        .emote { height: 24px; vertical-align: middle; margin: -2px 0; }

        /* STATUS DOTS */
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; transition: all 0.3s; }
        .dot.online { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
        .dot.loading { background: #ffcc00; box-shadow: 0 0 8px #ffcc00; animation: pulse 1s infinite; }
        .dot.offline { background: #ff4444; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* MODAL */
        #configModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #18181b; padding: 25px; border-radius: 8px; border: 1px solid #9147ff; width: 320px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-content h2 { margin: 0; font-size: 16px; color: #fff; }
        input { background: #000; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 4px; width: 100%; box-sizing: border-box; font-family: inherit; }
        .status-row { display: flex; align-items: center; gap: 8px; font-size: 11px; margin-top: 5px; color: #adadb8; }
        #version-display { font-size: 10px; color: #555; text-align: center; margin-top: 5px; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <button class="btn-settings" onclick="toggleModal(true)">⚙ Settings</button>
            <select id="siteFilter">
                <option value="all">All Sites</option>
                <option value="twitch">Twitch Only</option>
                <option value="youtube">YouTube Only</option>
            </select>
            <button class="btn-clear-gray" onclick="clearLog()">Clear Log</button>
        </div>
        <button id="clearOverlayBtn" class="btn-clear-red" onclick="socket.emit('clear-msg')">Clear Overlay</button>
    </div>

    <div id="dashboard" class="dashboard-container">
        <div class="column-pane">
            <div class="column-header">Main Feed</div>
            <div id="chat-log"></div>
        </div>

        <div id="focus-pane" class="column-pane">
            <div class="column-header">
                <span>Focus: <span id="focused-user-name">None</span></span>
                <button class="btn-close-x" onclick="clearFocus()">✕</button>
            </div>
            <div id="user-focus-log"></div>
        </div>
    </div>

    <div id="configModal">
        <div class="modal-content">
            <h2>Connection Settings</h2>
            <div>
                <input id="twitchInput" type="text" placeholder="Twitch Channel Name">
                <div class="status-row">Twitch Status: <div id="tDot" class="dot"></div></div>
            </div>
            <div>
                <input id="youtubeInput" type="text" placeholder="YouTube Handle or ID">
                <div class="status-row">YouTube Status: <div id="yDot" class="dot"></div></div>
            </div>
            <button style="background:#9147ff; color:white; width:100%; margin-top:10px; height:40px;" onclick="saveAll()">Update & Save</button>
            <button style="background:transparent; color:#adadb8; font-size:12px;" onclick="toggleModal(false)">Cancel</button>
            <div id="version-display">Build Date: Loading...</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const dashboard = document.getElementById('dashboard');
        const chatLog = document.getElementById('chat-log');
        const focusLog = document.getElementById('user-focus-log');
        const focusNameDisplay = document.getElementById('focused-user-name');
        const configModal = document.getElementById('configModal');
        const siteFilter = document.getElementById('siteFilter');
        
        let focusedUser = null;
        let globalEmoteMap = {};

        function toggleModal(s) { configModal.style.display = s ? 'flex' : 'none'; }
        function clearLog() { chatLog.innerHTML = ''; }
        
        function clearFocus() { 
            focusedUser = null; 
            focusLog.innerHTML = ''; 
            dashboard.classList.remove('has-focus'); 
            focusNameDisplay.innerText = 'None';
            focusNameDisplay.style.color = '#adadb8';
        }

        function saveAll() {
            socket.emit('update-channels', { 
                twitch: document.getElementById('twitchInput').value, 
                youtube: document.getElementById('youtubeInput').value 
            });
            toggleModal(false);
        }

        // Panic Button Logic: Escape clears overlay and focus
        document.addEventListener('keydown', (e) => { 
            if (e.key === "Escape") { 
                if (configModal.style.display === 'flex') {
                    toggleModal(false);
                } else {
                    clearFocus(); 
                    socket.emit('clear-msg'); 
                }
            } 
        });

        // Socket Events
        socket.on('status-update', (d) => {
            const dot = document.getElementById(d.platform === 'twitch' ? 'tDot' : 'yDot');
            if (dot) {
                dot.classList.remove('online', 'loading', 'offline');
                dot.classList.add(d.status);
            }
        });

        socket.on('current-config', (c) => {
            document.getElementById('twitchInput').value = c.twitch;
            document.getElementById('youtubeInput').value = c.youtube;
            document.getElementById('version-display').innerText = `Build Date: ${c.buildDate}`;
        });

        socket.on('init-assets', (d) => { globalEmoteMap = d.emotes || {}; });

        socket.on('new-message', (data) => {
            if (siteFilter.value !== 'all' && data.platform !== siteFilter.value) return;

            const msgHtml = `<span class="platform-tag tag-${data.platform}">${data.platform[0]}</span><span class="username" style="color:${data.color}">${data.user}:</span><span>${parseMessage(data)}</span>`;
            
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = msgHtml;
            
            div.onclick = () => {
                socket.emit('feature-msg', data);
                focusedUser = data.user;
                focusNameDisplay.innerText = data.user;
                focusNameDisplay.style.color = data.color;
                dashboard.classList.add('has-focus');
                
                // Immediate focus update
                focusLog.innerHTML = '';
                const firstMsg = document.createElement('div');
                firstMsg.className = 'msg';
                firstMsg.innerHTML = msgHtml;
                firstMsg.onclick = () => socket.emit('feature-msg', data);
                focusLog.prepend(firstMsg);
            };

            chatLog.prepend(div);
            if (chatLog.children.length > 150) chatLog.removeChild(chatLog.lastChild);

            // If we are focusing this user, add to the focus column automatically
            if (focusedUser && data.user.toLowerCase() === focusedUser.toLowerCase()) {
                const fDiv = document.createElement('div');
                fDiv.className = 'msg';
                fDiv.innerHTML = msgHtml;
                fDiv.onclick = () => socket.emit('feature-msg', data);
                focusLog.prepend(fDiv);
                if (focusLog.children.length > 50) focusLog.removeChild(focusLog.lastChild);
            }
        });

        function parseMessage(data) {
            if (data.platform === 'youtube' && data.elements) {
                return data.elements.map(m => {
                    if (m.type === 'emote') return `<img src="${m.url}" class="emote" alt="${m.text}">`;
                    return m.text.replace(/&/g, "&amp;").replace(/</g, "&lt;");
                }).join('');
            }

            let text = data.text;
            let twitchEmotes = data.emotes;
            const twitchMap = {};
            if (twitchEmotes) {
                Object.keys(twitchEmotes).forEach(id => twitchEmotes[id].forEach(range => {
                    const [s, e] = range.split('-').map(Number);
                    twitchMap[text.substring(s, e + 1)] = `https://static-cdn.jtvnw.net/emoticons/v2/${id}/default/dark/2.0`;
                }));
            }
            return text.split(' ').map(word => {
                if (twitchMap[word]) return `<img src="${twitchMap[word]}" class="emote">`;
                if (globalEmoteMap[word]) return `<img src="${globalEmoteMap[word]}" class="emote">`;
                return word.replace(/&/g, "&amp;").replace(/</g, "&lt;");
            }).join(' ');
        }
    </script>
</body>
</html>
